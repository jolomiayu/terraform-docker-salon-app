version: '3'

services:

  frontend:

    build: .

    container_name: salon-frontend

    ports:
      - "80:80"

    restart: always

    depends_on:
      - backend

  backend:

    build: ./backend

    container_name: salon-backend

    ports:
      - "3000:3000"

    restart: always

    env_file:
      - ./backend/.env

    depends_on:

      database:
        condition: service_healthy

  database:

    image: postgres:15

    container_name: salon-database

    restart: always

    environment:

      POSTGRES_USER: salonuser
      POSTGRES_PASSWORD: salonpass
      POSTGRES_DB: salondb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:

      test:
        [
          "CMD-SHELL",
          "pg_isready -U salonuser"
        ]

      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:

    image: prom/prometheus

    container_name: prometheus

    ports:
      - "9090:9090"

    restart: always

    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml

  grafana:

    image: grafana/grafana

    container_name: grafana

    ports:
      - "3001:3000"

    restart: always

    volumes:
      - grafana_data:/var/lib/grafana

  node-exporter:

    image: prom/node-exporter

    container_name: node-exporter

    ports:
      - "9100:9100"

    restart: always

volumes:

  postgres_data:

  grafana_data:
