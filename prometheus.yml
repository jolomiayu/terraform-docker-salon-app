global:

  scrape_interval: 5s

rule_files:
  - "alert_rules.yml"

scrape_configs:

  - job_name: 'prometheus'

    static_configs:
      - targets: ['prometheus:9090']

  - job_name: 'backend'

    static_configs:
      - targets: ['backend:3000']

  - job_name: 'node-exporter'

    static_configs:
      - targets: ['node-exporter:9100']
