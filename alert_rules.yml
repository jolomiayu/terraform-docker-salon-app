groups:

  - name: salon-alerts

    rules:

#      - alert: BackendDown
#
#        expr: up{job="backend"} == 0
#
#        for: 10s
#
#        labels:
#          severity: critical
#
#        annotations:
#
#          summary: "Backend service is DOWN"
#
#          description: "Salon backend API is unreachable."

      - alert: HighCPUUsage

        expr: 100 - (avg by(instance)
          (rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80

        for: 30s

        labels:
          severity: warning

        annotations:

          summary: "High CPU Usage"

          description: "CPU usage is above 80%."
